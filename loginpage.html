<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRISHIBOT Login</title>
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-cover bg-center" style="background-image: url('bg.jpg');">

  <!-- Navbar -->
  <nav class="bg-white shadow-lg py-4 px-8 flex justify-between items-center flex-wrap">
    <a href="#" class="flex items-center space-x-2">
      <img src="https://placehold.co/40x40/22c55e/ffffff?text=K" alt="KRISHIBOT Logo" class="h-10 w-10 rounded-lg">
      <span class="text-2xl font-bold text-green-700">KRISHIBOT</span>
    </a>
    <div class="flex items-center space-x-6">
      <a href="#" class="text-gray-700 hover:text-green-600 font-medium transition duration-300">Home</a>
      <a href="#" class="text-gray-700 hover:text-green-600 font-medium transition duration-300">About Us</a>
      
      <!-- Language Dropdown -->
      <div class="relative inline-block text-left">
        <button type="button" class="inline-flex justify-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none" id="language-menu-button">
          Language
          <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </button>
        <div class="origin-top-right absolute right-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 hidden z-10" id="language-menu">
          <div class="py-1" role="menu">
            <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Hindi</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">English</a>
            <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Kannada</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center p-4">
    <!-- ✅ Glass Effect Container START -->
    <div class="bg-white/30 backdrop-blur-lg border border-white/20 p-8 sm:p-12 rounded-2xl shadow-xl w-full max-w-sm sm:max-w-md">
      <h2 class="text-4xl font-extrabold text-center text-gray-900 mb-2">Welcome</h2>
      <p class="text-center mb-8 text-gray-700">Sign in to your KRISHIBOT account</p>

      <form id="login-form" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <input type="text" id="username" name="username" placeholder="Username" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
        </div>
        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-green-600 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-gray-900">Remember me</label>
          </div>
          <a href="#" class="font-medium text-green-600 hover:text-green-700">Forgot password?</a>
        </div>

        <div id="status-message" class="text-center text-sm font-medium hidden"></div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-300 transform hover:scale-105">
          Sign In
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-gray-600">
        Don't have an account? <a href="signup.html" class="font-medium text-green-600 hover:text-green-700">Register now</a>
      </p>
      <div id="user-id-display" class="mt-4 text-center text-xs text-gray-500 truncate"></div>
    </div>

x
