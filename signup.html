<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KRISHIBOT Signup</title>

  <!-- Fonts & Tailwind -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-cover bg-center"
      style="background-image: url('bg.jpg');">

  <!-- Navigation -->
  <nav class="bg-white shadow-lg py-4 px-8 flex justify-between items-center flex-wrap">
    <a href="#" class="flex items-center space-x-2">
      <img src="https://placehold.co/40x40/22c55e/ffffff?text=K" alt="KRISHIBOT Logo" class="h-10 w-10 rounded-lg"/>
      <span class="text-2xl font-bold text-green-700">KRISHIBOT</span>
    </a>
  </nav>

  <!-- Main Content - Signup Form -->
  <main class="flex-grow flex items-center justify-center p-4">
    <!-- ✅ Glass Effect Container START -->
    <div class="bg-white/30 backdrop-blur-lg border border-white/20 p-8 sm:p-12 rounded-2xl shadow-xl w-full max-w-sm sm:max-w-md">

      <h2 class="text-4xl font-extrabold text-center text-gray-900 mb-2">Create Account</h2>
      <p class="text-center mb-8 text-gray-700">Sign up for your KRISHIBOT account</p>

      <form id="signup-form" class="space-y-6">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="first-name" class="block text-sm font-medium text-gray-700">First Name</label>
            <input type="text" id="first-name" name="first-name" placeholder="First Name"
              class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
          </div>
          <div>
            <label for="last-name" class="block text-sm font-medium text-gray-700">Last Name</label>
            <input type="text" id="last-name" name="last-name" placeholder="Last Name"
              class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
        </div>

        <div>
          <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 transition duration-150" required>
        </div>

        <div id="status-message" class="text-center text-sm font-medium hidden"></div>

        <button type="submit"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-300 transform hover:scale-105">
          Sign Up
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-gray-600">
        Already have an account?
        <a href="login.html" class="font-medium text-green-600 hover:text-green-700">Login here</a>
      </p>
    </div>
    <!-- ✅ Glass Effect Container END -->
  </main>

  <!-- Script -->
  <script>
    const signupForm = document.getElementById('signup-form');
    const statusMessage = document.getElementById('status-message');

    signupForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const firstName = document.getElementById('first-name').value.trim();
      const lastName = document.getElementById('last-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      statusMessage.classList.remove('hidden', 'text-red-600', 'text-green-600');

      if (password !== confirmPassword) {
        statusMessage.textContent = "Passwords do not match!";
        statusMessage.classList.add('text-red-600');
        return;
      }

      console.log(`Signup attempt: ${firstName} ${lastName}, Email: ${email}`);
      statusMessage.textContent = "Signup successful! (Placeholder)";
      statusMessage.classList.add('text-green-600');

      // Redirect after success
      setTimeout(() => {
        window.location.href = "mainpage.html";
      }, 2000);
    });
  </script>
</body>
</html>
